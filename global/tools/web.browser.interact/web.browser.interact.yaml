author: hermes
created: '2026-05-10T00:00:00Z'
description: >
  Interactive element action tool. Performs click, type, or submit actions on 
  DOM elements and captures resulting page state including URL changes, alerts, 
  redirects, and new DOM content.
id: web.browser.interact
implementation:
  atom_dir: ~/.securatron/global/tools/web.browser.interact
  cmd: '{atom_dir}/browser_interact.py --url {url} --selector {selector} --action {action} --value {value}'
  kind: shell
inputs:
  url:
    required: true
    type: string
    description: Target URL to interact with
  selector:
    required: true
    type: string
    description: CSS selector, XPath, or ref_id (e.g., '@e1')
  action:
    required: true
    type: string
    description: "Action to perform: click, type, or submit"
  value:
    required: false
    type: string
    default: ''
    description: Text to type (required for 'type' action)
outputs:
  artifact_path: '{session}/artifacts/web.browser.interact-{ts}.json'
  type: web.browser.interact.v1
postconditions:
  - result|success == true
  - result.new_url or result.url_changed or result.new_interactive_count > 0
promotion:
  required_distinct_inputs: 3
  required_success: 3
  requires_human_review: false
preconditions:
  - scope.includes(inputs.url)
  - chromium.available
  - playwright.installed
risk: medium
reversible: true
side_effects:
  - browser_launch
  - network_probe
  - form_submission
tier: global
trials:
  failure: 0
  last_run: null
  success: 0
version: 1
