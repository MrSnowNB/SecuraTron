author: hermes
created: '2026-05-05T21:55:00-04:00'
description: Execute arbitrary shell commands on the target system. Used for exploit execution, post-exploitation, and flag capture.
id: shell.run
implementation:
  cmd: {command}
  kind: shell
inputs:
  command:
    required: true
    type: string
    description: "Shell command to execute on target"
  timeout:
    default: 30
    type: integer
    description: "Command timeout in seconds"
kind: atom
outputs:
  artifact_path: '{session}/artifacts/shell_{ts}.txt'
  type: shell.run.v1
postconditions:
  - artifact_exists(outputs.artifact_path)
promotion:
  required_distinct_inputs: 5
  required_success: 5
  requires_human_review: false
reversible: true
risk: medium
side_effects:
  - system_change
  - command_execution
tier: global
trials:
  failure: 0
  last_run: null
  success: 0
version: 1
