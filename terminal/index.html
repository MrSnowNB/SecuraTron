<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SECURATRON // VAULT TERMINAL</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

  :root {
    --phosphor: #33ff33;
    --phosphor-dim: #1a8a1a;
    --phosphor-glow: #33ff3344;
    --bg: #0a0a0a;
    --scanline: rgba(0,0,0,0.15);
    --amber: #ffb000;
    --amber-dim: #996a00;
    --amber-glow: #ffb00044;
    --red: #ff3333;
    --red-glow: #ff333344;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--phosphor);
    font-family: 'Share Tech Mono', 'Courier New', monospace;
    font-size: 14px;
    line-height: 1.5;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  /* CRT Effects */
  .crt-overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1000;
  }
  .crt-overlay::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      var(--scanline) 0px,
      var(--scanline) 1px,
      transparent 1px,
      transparent 3px
    );
    animation: scanlines 0.1s linear infinite;
    opacity: 0.4;
  }
  .crt-overlay::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.6) 100%);
  }

  @keyframes scanlines {
    0% { transform: translateY(0); }
    100% { transform: translateY(3px); }
  }

  @keyframes flicker {
    0% { opacity: 0.97; }
    5% { opacity: 0.95; }
    10% { opacity: 0.98; }
    15% { opacity: 0.96; }
    20% { opacity: 0.99; }
    50% { opacity: 0.97; }
    80% { opacity: 0.98; }
    100% { opacity: 0.96; }
  }

  @keyframes blink {
    0%, 50% { opacity: 1; }
    51%, 100% { opacity: 0; }
  }

  @keyframes textShadow {
    0% { text-shadow: 0 0 5px var(--phosphor-glow); }
    50% { text-shadow: 0 0 10px var(--phosphor-glow), 0 0 20px var(--phosphor-glow); }
    100% { text-shadow: 0 0 5px var(--phosphor-glow); }
  }

  @keyframes bootLine {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  #app {
    animation: flicker 4s infinite;
    display: flex;
    flex-direction: column;
    height: 100vh;
    position: relative;
  }

  /* Boot Screen */
  #boot-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 999;
    padding: 40px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  #boot-screen .boot-line {
    opacity: 0;
    animation: bootLine 0.3s forwards;
    white-space: pre;
    font-size: 13px;
  }

  /* Header */
  .header {
    border-bottom: 1px solid var(--phosphor-dim);
    padding: 8px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
    background: linear-gradient(180deg, rgba(51,255,51,0.03) 0%, transparent 100%);
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .header-title {
    font-size: 18px;
    letter-spacing: 4px;
    animation: textShadow 2s infinite;
  }
  .header-status {
    display: flex;
    gap: 12px;
    font-size: 11px;
    color: var(--phosphor-dim);
  }
  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--phosphor);
    display: inline-block;
    margin-right: 4px;
    animation: pulse 2s infinite;
  }
  .status-dot.offline { background: var(--red); }

  /* Main Area */
  .main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* Chat Panel */
  .chat-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--phosphor-dim);
    min-width: 0;
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--phosphor-dim) transparent;
  }
  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-track { background: transparent; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--phosphor-dim); }

  .message {
    margin-bottom: 12px;
    animation: slideIn 0.3s ease-out;
  }
  .message.user { text-align: right; }
  .message.system { text-align: center; color: var(--amber); }

  .message .label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--phosphor-dim);
    margin-bottom: 2px;
  }
  .message.user .label { color: var(--phosphor-dim); }
  .message.system .label { color: var(--amber-dim); }

  .message .content {
    display: inline-block;
    max-width: 100%;
    word-wrap: break-word;
  }
  .message.user .content {
    background: rgba(51,255,51,0.08);
    padding: 4px 10px;
    border-right: 2px solid var(--phosphor);
  }
  .message.assistant .content {
    text-align: left;
  }
  .message.assistant .content pre {
    background: rgba(0,0,0,0.5);
    border: 1px solid var(--phosphor-dim);
    padding: 8px;
    margin: 4px 0;
    overflow-x: auto;
    font-size: 12px;
  }

  .message .image-container {
    margin-top: 8px;
    display: inline-block;
  }
  .message .image-container img {
    max-width: 400px;
    max-height: 300px;
    border: 1px solid var(--phosphor-dim);
    display: block;
    image-rendering: pixelated;
  }

  /* Typing indicator */
  .typing-indicator {
    display: none;
    padding: 8px 16px;
    color: var(--phosphor-dim);
    font-size: 12px;
  }
  .typing-indicator.active { display: block; }
  .typing-indicator .dots::after {
    content: '';
    animation: dots 1.5s steps(4) infinite;
  }
  @keyframes dots {
    0% { content: ''; }
    25% { content: '.'; }
    50% { content: '..'; }
    75% { content: '...'; }
  }

  /* Input Area */
  .input-area {
    border-top: 1px solid var(--phosphor-dim);
    padding: 8px 16px;
    display: flex;
    gap: 8px;
    flex-shrink: 0;
    background: rgba(0,0,0,0.3);
  }
  .input-prefix {
    color: var(--phosphor);
    padding-top: 8px;
    font-size: 16px;
    animation: blink 1s infinite;
  }
  .input-area input {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--phosphor);
    font-family: inherit;
    font-size: 14px;
    outline: none;
    caret-color: var(--phosphor);
  }
  .input-area input::placeholder {
    color: var(--phosphor-dim);
  }

  .btn {
    background: transparent;
    border: 1px solid var(--phosphor-dim);
    color: var(--phosphor);
    font-family: inherit;
    font-size: 12px;
    padding: 6px 12px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .btn:hover {
    background: rgba(51,255,51,0.15);
    border-color: var(--phosphor);
  }
  .btn.active {
    background: rgba(51,255,51,0.2);
    border-color: var(--phosphor);
    box-shadow: 0 0 8px var(--phosphor-glow);
  }
  .btn.mic-active {
    border-color: var(--red);
    color: var(--red);
    background: rgba(255,51,51,0.15);
    box-shadow: 0 0 8px var(--red-glow);
    animation: pulse 1s infinite;
  }

  /* Right Panel - Model Status */
  .side-panel {
    width: 280px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    background: rgba(0,0,0,0.2);
  }
  .panel-section {
    border-bottom: 1px solid var(--phosphor-dim);
    padding: 10px 12px;
  }
  .panel-title {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--phosphor-dim);
    margin-bottom: 6px;
  }
  .model-info {
    font-size: 12px;
    line-height: 1.8;
  }
  .model-info .row {
    display: flex;
    justify-content: space-between;
  }
  .model-info .key { color: var(--phosphor-dim); }
  .model-info .val { color: var(--phosphor); }

  .model-btn {
    display: block;
    width: 100%;
    text-align: left;
    margin: 2px 0;
    font-size: 11px;
    padding: 4px 8px;
    border: 1px solid transparent;
  }
  .model-btn:hover { border-color: var(--phosphor-dim); }
  .model-btn.current {
    border-color: var(--phosphor);
    background: rgba(51,255,51,0.1);
  }

  .model-btn .model-size {
    float: right;
    color: var(--phosphor-dim);
  }

  /* Image Gallery */
  .image-gallery {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .image-gallery img {
    max-width: 100%;
    border: 1px solid var(--phosphor-dim);
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .image-gallery img:hover { border-color: var(--phosphor); }

  /* Image Viewer Modal */
  #image-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    z-index: 998;
    justify-content: center;
    align-items: center;
    cursor: pointer;
  }
  #image-modal.active { display: flex; }
  #image-modal img {
    max-width: 90vw;
    max-height: 90vh;
    border: 2px solid var(--phosphor-dim);
  }

  /* System log */
  .system-log {
    font-size: 10px;
    color: var(--phosphor-dim);
    max-height: 100px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--phosphor-dim) transparent;
  }
  .system-log .log-line {
    padding: 1px 0;
    border-bottom: 1px solid rgba(26,138,26,0.1);
  }
  .system-log .log-line .timestamp {
    color: var(--phosphor-dim);
    margin-right: 6px;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .side-panel { display: none; }
    .header-title { font-size: 14px; letter-spacing: 2px; }
  }

  /* Amber mode for warnings */
  .amber { color: var(--amber) !important; }
  .red { color: var(--red) !important; }
</style>
</head>
<body>

<!-- CRT Overlay -->
<div class="crt-overlay"></div>

<!-- Boot Screen -->
<div id="boot-screen"></div>

<!-- Image Viewer Modal -->
<div id="image-modal" onclick="this.classList.remove('active')">
  <img id="modal-image" src="" alt="Generated image">
</div>

<!-- Main App -->
<div id="app" style="display:none;">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <span class="header-title">SECURATRON // VAULT TERMINAL</span>
      <span class="header-status">
        <span id="status-server"><span class="status-dot offline"></span>SERVER</span>
        <span id="status-mic"><span class="status-dot"></span>VOICE</span>
      </span>
    </div>
    <div class="header-status">
      <span id="clock">00:00:00</span>
      <span id="model-indicator">MODEL: ---</span>
    </div>
  </div>

  <!-- Main Area -->
  <div class="main">
    <!-- Chat Panel -->
    <div class="chat-panel">
      <div class="chat-messages" id="chat-messages"></div>
      <div class="typing-indicator" id="typing">
        SECURATRON IS THINKING<span class="dots"></span>
      </div>
      <div class="input-area">
        <span class="input-prefix">&gt;</span>
        <input type="text" id="chat-input" placeholder="Enter command or message..." autocomplete="off" autofocus>
        <button class="btn" id="btn-mic" title="Voice Input">MIC</button>
        <button class="btn" id="btn-voice" title="Toggle Voice Output">TTS: OFF</button>
        <button class="btn" id="btn-clear" title="Clear chat">CLR</button>
      </div>
    </div>

    <!-- Side Panel -->
    <div class="side-panel">
      <div class="panel-section">
        <div class="panel-title">SYSTEM STATUS</div>
        <div class="model-info" id="system-info">
          <div class="row"><span class="key">Version</span><span class="val" id="info-version">---</span></div>
          <div class="row"><span class="key">Status</span><span class="val" id="info-status">---</span></div>
          <div class="row"><span class="key">RAM</span><span class="val" id="info-ram">---</span></div>
        </div>
      </div>

      <div class="panel-section">
        <div class="panel-title">LOADED MODELS</div>
        <div class="model-info" id="loaded-models">
          <div style="color: var(--phosphor-dim); font-size: 11px;">No models loaded</div>
        </div>
      </div>

      <div class="panel-section">
        <div class="panel-title">AVAILABLE MODELS (click to swap)</div>
        <div id="model-list"></div>
      </div>

      <div class="panel-section">
        <div class="panel-title">IMAGE GALLERY</div>
        <div class="image-gallery" id="image-gallery">
          <div style="color: var(--phosphor-dim); font-size: 11px;">No images generated</div>
        </div>
      </div>

      <div class="panel-section">
        <div class="panel-title">SYSTEM LOG</div>
        <div class="system-log" id="system-log"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ============================================================
// SECURATRON VAULT TERMINAL
// ============================================================

const LEMONADE_HOST = '127.0.0.1';
const LEMONADE_PORT = '13305';
const BASE = `http://${LEMONADE_HOST}:${LEMONADE_PORT}`;

// State
let chatHistory = [];
let voiceEnabled = false;
let isRecording = false;
let recognition = null;
let ttsAudioQueue = [];
let isSpeaking = false;
let imageGallery = [];
let currentModel = null;
let currentBackendUrl = null;

// ---- Boot Sequence ----
const bootLines = [
  "SECURATRON v4.0.1 // VAULT TERMINAL INIT",
  "────────────────────────────────────────",
  "",
  "  MEMORY CHECK.......... 32768 MB OK",
  "  GPU DETECTED.......... AMD ROCm v3.11",
  "  STORAGE............... NVMe 906GB [25%]",
  "  NETWORK............... LOCALHOST OK",
  "  LEMONADE SERVER....... CONNECTING...",
  "",
  "  LOADING MODULES...",
  "    [OK] CHAT SUBSYSTEM",
  "    [OK] VOICE INTERFACE (Web Speech API)",
  "    [OK] IMAGE GENERATION (Flux-2)",
  "    [OK] TTS ENGINE (Kokoro-v1)",
  "    [OK] AUDIO TRANSCRIPTION (Whisper v3)",
  "    [OK] MODEL MANAGER",
  "",
  "  ALL SYSTEMS NOMINAL.",
  "  WELCOME TO THE SECURATRON VAULT.",
  "",
  "  Commands: /status, /swap <model>, /clear, /help",
  "",
  "────────────────────────────────────────",
];

async function boot() {
  const screen = document.getElementById('boot-screen');
  for (let i = 0; i < bootLines.length; i++) {
    const line = document.createElement('div');
    line.className = 'boot-line';
    line.textContent = bootLines[i];
    line.style.animationDelay = `${i * 0.08}s`;
    screen.appendChild(line);
    await new Promise(r => setTimeout(r, 80));
  }
  await new Promise(r => setTimeout(r, 500));
  screen.style.transition = 'opacity 0.5s';
  screen.style.opacity = '0';
  await new Promise(r => setTimeout(r, 500));
  screen.style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  initClock();
  await initSystem();
  document.getElementById('chat-input').focus();
}

// ---- Clock ----
function initClock() {
  function update() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toTimeString().split(' ')[0];
  }
  update();
  setInterval(update, 1000);
}

// ---- System Init ----
async function initSystem() {
  addLog('System initialization started');
  try {
    await updateHealth();
    await updateModels();
    addLog('System initialized successfully');
    setServerStatus(true);
  } catch (e) {
    addLog('WARNING: Server connection failed: ' + e.message);
    setServerStatus(false);
  }
}

// ---- Health Endpoint ----
async function updateHealth() {
  try {
    const resp = await fetch(`${BASE}/api/v1/health`);
    const data = await resp.json();
    currentModel = data.model_loaded;
    document.getElementById('model-indicator').textContent =
      currentModel ? `MODEL: ${currentModel.split(':')[0]}` : 'MODEL: NONE';
    document.getElementById('info-version').textContent = data.version || '---';
    document.getElementById('info-status').textContent = data.status || '---';

    const mem = await getMemoryUsage();
    document.getElementById('info-ram').textContent = `${mem.used.toFixed(0)}/${mem.total}GB`;

    // Update loaded models panel
    const loadedDiv = document.getElementById('loaded-models');
    if (data.all_models_loaded && data.all_models_loaded.length > 0) {
      loadedDiv.innerHTML = data.all_models_loaded.map(m =>
        `<div class="row">
          <span class="key">${m.type.toUpperCase()}</span>
          <span class="val" style="max-width:180px;overflow:hidden;text-overflow:ellipsis;" title="${m.model_name}">${m.model_name}</span>
        </div>`
      ).join('');
    }
  } catch (e) {
    console.error('Health update failed:', e);
  }
}

async function getMemoryUsage() {
  try {
    const resp = await fetch(`${BASE}/api/v1/system-stats`);
    const data = await resp.json();
    return {
      total: Math.round(data.memory?.total / (1024*1024*1024) || 32),
      used: Math.round(data.memory?.used / (1024*1024*1024) || 24)
    };
  } catch {
    try {
      const mem = await fetch('/api/v1/system-stats');
    } catch {}
    // Fallback
    return { total: 32, used: 24 };
  }
}

// ---- Models Endpoint ----
async function updateModels() {
  try {
    const resp = await fetch(`${BASE}/v1/models`);
    const data = await resp.json();
    const listDiv = document.getElementById('model-list');
    const llms = data.data.filter(m => m.recipe === 'llamacpp');
    listDiv.innerHTML = llms.map(m => {
      const isCurrent = currentModel && m.id === currentModel.split(':')[0];
      return `<button class="btn model-btn ${isCurrent ? 'current' : ''}"
                onclick="swapModel('${m.id}')">
        ${m.id}
        <span class="model-size">${m.size}GB</span>
      </button>`;
    }).join('');
  } catch (e) {
    console.error('Models update failed:', e);
  }
}

async function swapModel(modelId) {
  addChat('system', `SWAPPING MODEL TO: ${modelId}`);
  addLog(`Swapping to ${modelId}...`);
  try {
    // Use HTTP API to load model
    const resp = await fetch(`${BASE}/v1/models/${modelId}/load`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: modelId })
    });
    if (!resp.ok) {
      // Fallback: use CLI via API
      const resp2 = await fetch(`${BASE}/api/v1/load`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: modelId })
      });
    }
    // Wait and refresh
    setTimeout(async () => {
      await updateHealth();
      await updateModels();
      addLog(`Model swapped to ${modelId}`);
    }, 3000);
  } catch (e) {
    addLog(`Swap failed: ${e.message}`);
    addChat('system', `SWAP FAILED: ${e.message}`);
  }
}

// ---- Chat ----
function addChat(role, text, imageBase64 = null) {
  const container = document.getElementById('chat-messages');
  const msg = document.createElement('div');
  msg.className = `message ${role}`;

  const labels = { user: 'OPERATOR', assistant: 'SECURATRON', system: 'SYSTEM' };
  msg.innerHTML = `
    <div class="label">${labels[role] || role}</div>
    <div class="content">${escapeHtml(text)}</div>
  `;

  if (imageBase64) {
    const imgContainer = document.createElement('div');
    imgContainer.className = 'image-container';
    const img = document.createElement('img');
    img.src = imageBase64;
    img.onclick = () => showImageModal(imageBase64);
    imgContainer.appendChild(img);
    msg.appendChild(imgContainer);
  }

  container.appendChild(msg);
  container.scrollTop = container.scrollHeight;

  if (role === 'assistant' && voiceEnabled && !imageBase64) {
    speak(text);
  }
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML
    .replace(/\n/g, '<br>')
    .replace(/ {2}/g, '&nbsp; ');
}

// ---- Chat Input ----
const chatInput = document.getElementById('chat-input');
chatInput.addEventListener('keydown', async (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    const text = chatInput.value.trim();
    if (!text) return;
    chatInput.value = '';
    handleInput(text);
  }
});

async function handleInput(text) {
  // Check for commands
  if (text.startsWith('/')) {
    return handleCommand(text);
  }

  addChat('user', text);
  chatHistory.push({ role: 'user', content: text });

  // Check if this is an image generation request
  if (isImageRequest(text)) {
    return generateImage(text);
  }

  // Send to chat
  showTyping(true);
  try {
    const resp = await fetch(`${BASE}/v1/chat/completions`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: currentModel ? currentModel.split(':')[0] : undefined,
        messages: chatHistory.slice(-20),
        max_tokens: 2048,
        stream: false
      })
    });
    const data = await resp.json();
    const reply = data.choices?.[0]?.message?.content || 'No response.';
    showTyping(false);
    addChat('assistant', reply);
    chatHistory.push({ role: 'assistant', content: reply });
  } catch (e) {
    showTyping(false);
    addChat('system', `ERROR: ${e.message}`);
  }
}

function isImageRequest(text) {
  const lower = text.toLowerCase();
  return lower.includes('generate image') ||
         lower.includes('create an image') ||
         lower.includes('draw ') ||
         lower.includes('picture of') ||
         lower.includes('image of ');
}

async function generateImage(prompt) {
  addChat('system', `GENERATING IMAGE: "${prompt}"`);
  addLog(`Image generation: ${prompt.substring(0, 50)}...`);
  showTyping(true);
  try {
    const resp = await fetch(`${BASE}/v1/images/generations`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'Flux-2-Klein-4B',
        prompt: prompt,
        size: '1024x1024',
        n: 1
      })
    });
    const data = await resp.json();
    showTyping(false);

    if (data.data && data.data[0]?.b64_json) {
      const b64 = data.data[0].b64_json;
      const imgSrc = `data:image/png;base64,${b64}`;
      addChat('assistant', `Image generated for: "${prompt}"`, imgSrc);

      // Add to gallery
      imageGallery.unshift(imgSrc);
      updateImageGallery();

      addLog(`Image generated and displayed`);
    } else {
      addChat('system', 'IMAGE GENERATION FAILED: No image data returned');
    }
  } catch (e) {
    showTyping(false);
    addChat('system', `IMAGE ERROR: ${e.message}`);
    addLog(`Image generation error: ${e.message}`);
  }
}

function updateImageGallery() {
  const gallery = document.getElementById('image-gallery');
  if (imageGallery.length === 0) {
    gallery.innerHTML = '<div style="color: var(--phosphor-dim); font-size: 11px;">No images generated</div>';
    return;
  }
  gallery.innerHTML = imageGallery.slice(0, 8).map(src =>
    `<img src="${src}" alt="Generated image" onclick="showImageModal('${src}')">`
  ).join('');
}

function showImageModal(src) {
  const modal = document.getElementById('image-modal');
  document.getElementById('modal-image').src = src;
  modal.classList.add('active');
}

// ---- Commands ----
async function handleCommand(text) {
  const parts = text.split(' ');
  const cmd = parts[0].toLowerCase();

  switch (cmd) {
    case '/status':
      await updateHealth();
      await updateModels();
      addChat('system', 'SYSTEM STATUS UPDATED');
      break;

    case '/clear':
      document.getElementById('chat-messages').innerHTML = '';
      chatHistory = [];
      addChat('system', 'CHAT CLEARED');
      break;

    case '/swap':
      if (parts[1]) {
        await swapModel(parts[1]);
      } else {
        addChat('system', 'USAGE: /swap <model_id>');
        addChat('system', `Available: ${['Qwen3.6-35B-A3B-GGUF', 'Gemma-4-31B-it-GGUF', 'Qwen3.6-27B-GGUF'].join(', ')}`);
      }
      break;

    case '/unload':
      addChat('system', 'UNLOADING ALL MODELS');
      try {
        await fetch(`${BASE}/api/v1/unload`, { method: 'POST' });
        addChat('system', 'ALL MODELS UNLOADED');
        await updateHealth();
        await updateModels();
      } catch (e) {
        addChat('system', `UNLOAD FAILED: ${e.message}`);
      }
      break;

    case '/image':
    case '/img':
      if (parts[1]) {
        const prompt = parts.slice(1).join(' ');
        await generateImage(prompt);
      } else {
        addChat('system', 'USAGE: /image <description>');
      }
      break;

    case '/tts':
      voiceEnabled = !voiceEnabled;
      document.getElementById('btn-voice').textContent = `TTS: ${voiceEnabled ? 'ON' : 'OFF'}`;
      document.getElementById('btn-voice').classList.toggle('active', voiceEnabled);
      addChat('system', `TTS: ${voiceEnabled ? 'ENABLED' : 'DISABLED'}`);
      break;

    case '/help':
      addChat('system', [
        'SECURATRON HELP',
        '─────────────────',
        '/status       - Refresh system status',
        '/clear        - Clear chat history',
        '/swap <model> - Swap to specified LLM',
        '/unload       - Unload all models',
        '/image <desc> - Generate an image',
        '/tts          - Toggle text-to-speech',
        '/help         - Show this help',
        '─────────────────',
        'Voice: Click MIC to speak, TTS for audio output'
      ].join('\n'));
      break;

    default:
      addChat('system', `UNKNOWN COMMAND: ${cmd}. Type /help for available commands.`);
  }
}

// ---- Voice Input (Web Speech API) ----
const btnMic = document.getElementById('btn-mic');
btnMic.addEventListener('click', toggleMic);

function toggleMic() {
  if (isRecording) {
    stopRecording();
  } else {
    startRecording();
  }
}

function startRecording() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    addChat('system', 'SPEECH RECOGNITION NOT SUPPORTED IN THIS BROWSER');
    return;
  }

  recognition = new SpeechRecognition();
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.lang = 'en-US';

  recognition.onstart = () => {
    isRecording = true;
    btnMic.classList.add('mic-active');
    btnMic.textContent = '● REC';
    document.getElementById('status-mic').innerHTML = '<span class="status-dot" style="background:var(--red);"></span>REC';
  };

  recognition.onresult = (event) => {
    const transcript = event.results[0][0].transcript;
    addChat('user', `[MIC] ${transcript}`);
    handleInput(transcript);
  };

  recognition.onend = () => {
    stopRecording();
  };

  recognition.onerror = (event) => {
    addChat('system', `MIC ERROR: ${event.error}`);
    stopRecording();
  };

  recognition.start();
}

function stopRecording() {
  if (recognition) {
    recognition.stop();
  }
  isRecording = false;
  btnMic.classList.remove('mic-active');
  btnMic.textContent = 'MIC';
  document.getElementById('status-mic').innerHTML = '<span class="status-dot"></span>VOICE';
}

// ---- TTS Output ----
const btnVoice = document.getElementById('btn-voice');
btnVoice.addEventListener('click', () => {
  voiceEnabled = !voiceEnabled;
  btnVoice.textContent = `TTS: ${voiceEnabled ? 'ON' : 'OFF'}`;
  btnVoice.classList.toggle('active', voiceEnabled);
  addChat('system', `TTS: ${voiceEnabled ? 'ENABLED' : 'DISABLED'}`);
});

function speak(text) {
  // Clean text for TTS
  const clean = text
    .replace(/```[\s\S]*?```/g, '')
    .replace(/`[^`]+`/g, '')
    .replace(/#{1,6}\s/g, '')
    .replace(/[-*_\[\]]/g, '')
    .trim();

  if (!clean || clean.length < 3) return;

  fetch(`${BASE}/v1/audio/speech`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'kokoro-v1',
      input: clean.substring(0, 500),
      voice: 'alloy'
    })
  })
  .then(r => r.arrayBuffer())
  .then(buf => {
    const audio = new Audio(`data:audio/mpeg;base64,${btoa(
      Array.from(new Uint8Array(buf)).map(b => String.fromCharCode(b)).join('')
    )}`);
    audio.play().catch(() => addChat('system', 'AUDIO PLAYBACK FAILED'));
  })
  .catch(e => addChat('system', `TTS ERROR: ${e.message}`));
}

// ---- UI Helpers ----
function showTyping(show) {
  document.getElementById('typing').classList.toggle('active', show);
}

function setServerStatus(online) {
  const el = document.getElementById('status-server');
  el.innerHTML = `<span class="status-dot ${online ? '' : 'offline'}"></span>SERVER`;
}

function addLog(msg) {
  const log = document.getElementById('system-log');
  const time = new Date().toTimeString().split(' ')[0];
  const line = document.createElement('div');
  line.className = 'log-line';
  line.innerHTML = `<span class="timestamp">[${time}]</span>${escapeHtml(msg)}`;
  log.appendChild(line);
  log.scrollTop = log.scrollHeight;
}

// ---- Init ----
window.addEventListener('load', boot);

// Keyboard shortcut
document.addEventListener('keydown', (e) => {
  if (e.key === '/' && document.activeElement !== chatInput) {
    e.preventDefault();
    chatInput.focus();
  }
  if (e.key === 'Escape') {
    document.getElementById('image-modal').classList.remove('active');
  }
});
</script>
